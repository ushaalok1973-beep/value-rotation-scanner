name: Build Universe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Libraries
      run: |
        pip install pandas

    - name: Run Universe Builder
      run: |
        python build_universe.py

    - name: Commit universe.csv
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add universe.csv

        git commit -m "Updated universe.csv" || echo "No changes"

        git push
