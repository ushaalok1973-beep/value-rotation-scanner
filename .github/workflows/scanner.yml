name: Value Rotation Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1-5"

jobs:
  scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy yfinance requests

      - name: Run scanner
        run: |
          python value_scanner.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add rotation_candidates.csv || true
          git commit -m "rotation scan update" || true
          git push || true
